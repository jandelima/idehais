<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="IDEHAIS — Instituto de Desenvolvimento Habitacional de Interesse Social."
    />
    <meta name="theme-color" content="#a91e12" />
    <link rel="icon" href="assets/logo-idehais.png" />
    <title>IDEHAIS</title>

    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #171717;
        background: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(28px, 6vw, 56px);
        text-align: center;
        background: #ffffff;
        border-top: 5px solid #a91e12;
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }

      img {
        display: block;
        width: min(100%, 420px);
        height: auto;
        margin: -80px auto -65px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.5rem, 5vw, 2.25rem);
        line-height: 1.15;
      }

      p {
        max-width: 500px;
        margin: 0 auto;
        color: #5b5b5b;
        font-size: 1rem;
        line-height: 1.6;
      }

      .status {
        display: inline-block;
        margin-top: 28px;
        padding: 10px 16px;
        color: #8f180e;
        background: #fff0ee;
        border-radius: 999px;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      @media (max-width: 480px) {
        main {
          padding-inline: 20px;
        }

        img {
          margin-block: -55px -42px;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <img
        src="assets/logo-idehais.png"
        width="1254"
        height="1254"
        alt="IDEHAIS — Instituto de Desenvolvimento Habitacional de Interesse Social"
      />

      <h1>Nosso site estará disponível em breve.</h1>
      <p>
        Estamos preparando o novo espaço digital do Instituto de Desenvolvimento
        Habitacional de Interesse Social.
      </p>

      <span class="status">Site em construção</span>
    </main>
  </body>
</html>
